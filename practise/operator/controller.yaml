apiVersion: v1

kind: ConfigMap

metadata:
  name: webapp-controller-scripts
  namespace: webapp-operator

data:
  reconcile.sh: |
    #!/usr/bin/env bash
    NS="${WATCH_NAMESPACE:-webapp-operator}"
    echo "[controller] starting; watching WebApps in namespace '$NS'"
    while true; do
      kubectl get webapps -n "$NS" \
        -o jsonpath='{range .items[*]}{.metadata.name}|{.spec.image}|{.spec.replicas}{"\n"}{end}' \
      | while IFS='|' read -r name image replicas; do
          [ -z "$name" ] && continue
          replicas="${replicas:-1}"
          echo "[controller] reconciling WebApp/$name (image=$image replicas=$replicas)"
          sed -e "s|__NAME__|$name|g" \
              -e "s|__IMAGE__|$image|g" \
              -e "s|__REPLICAS__|$replicas|g" \
              -e "s|__NS__|$NS|g" \
              /scripts/deployment-template.yaml | kubectl apply -f -
        done
      sleep 10   
    done
  deployment-template.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: __NAME__
      namespace: __NS__
      labels:
        managed-by: webapp-controller
        webapp: __NAME__
    spec:
      replicas: __REPLICAS__
      selector:
        matchLabels:
          webapp: __NAME__
      template:
        metadata:
          labels:
            webapp: __NAME__
        spec:
          containers:
          - name: web
            image: __IMAGE__

---

apiVersion: apps/v1

kind: Deployment

metadata:
  name: webapp-controller
  namespace: webapp-operator

spec:
  replicas: 1
  selector:
    matchLabels: { app: webapp-controller }
  template:
    metadata:
      labels: { app: webapp-controller }
    spec:
      serviceAccountName: webapp-controller     

      containers:
      - name: controller
        image: alpine/k8s:1.31.0                 
        command: ["/bin/bash", "/scripts/reconcile.sh"]
        env:
        - name: WATCH_NAMESPACE
          value: webapp-operator
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: webapp-controller-scripts