apiVersion: rbac.authorization.k8s.io/v1

kind: Role

metadata:
  name: pod-reader
  namespace: rbac-demo

rules:
- apiGroups: [""]          # "" = the core API group (pods, services, configmaps…)
  resources: ["pods"]
  verbs: ["get", "list", "watch"]


---

apiVersion: rbac.authorization.k8s.io/v1

kind: RoleBinding

metadata:
  name: reader-can-read-pods
  namespace: rbac-demo

subjects:
- kind: ServiceAccount
  name: reader
  namespace: rbac-demo
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io